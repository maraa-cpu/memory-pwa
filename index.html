<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <title>Memory PWA</title>
  <style>
    body { font-family: sans-serif; text-align: center; background-color: #f5f5f5; }
    .grid-4x4 { display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; justify-content: center; margin-top: 20px;}
    .card { width: 80px; height: 80px; background-color: #ddd; display: flex; align-items: center; justify-content: center; font-size: 2em; cursor: pointer; border-radius: 8px;}
    .hidden { background-color: #2f3d58; color: transparent; }
  </style>
</head>
<body>
  <h1>Memory</h1>
  <p>Mosse totali: <span id="moves">0</span></p>
  <p>Miglior punteggio: <span id="best-score">-</span></p>
  <button id="reset-btn">Reset Partita</button>
  
  <div id="game-board" class="grid-4x4"></div>

  <script src="/app.js"></script>
  <script>
    // Registrazione del Service Worker 
    if('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' });
    }
  </script>
</body>
</html>
