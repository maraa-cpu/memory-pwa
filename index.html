<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>Memory PWA</title>
  <style>
    :root { --bg: #f5f5f5; --primary: #2f3d58; --accent: #4caf50; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: var(--bg); margin: 0; padding: 20px; color: var(--primary); }
    h1 { font-size: 2.5em; margin-bottom: 5px; }
    
    .stats { display: flex; justify-content: center; gap: 20px; font-size: 1.2em; margin-bottom: 20px; font-weight: bold; }
    button { background-color: var(--primary); color: white; border: none; padding: 12px 24px; font-size: 1.1em; border-radius: 8px; cursor: pointer; transition: transform 0.2s, background 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    button:hover { background-color: #1e2738; transform: translateY(-2px); }
    button:active { transform: translateY(0); }
    
    .grid-4x4 { display: grid; grid-template-columns: repeat(4, 80px); gap: 15px; justify-content: center; margin-top: 30px; perspective: 1000px; }
    
    .card { width: 80px; height: 80px; position: relative; cursor: pointer; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1); }
    .card.flipped { transform: rotateY(180deg); cursor: default; }
    
    .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 2.5em; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
    
    .card-back { background-color: var(--primary); background-image: url('icon.jpeg'); background-size: cover; background-position: center; border: 2px solid white; }
    
    .card-front { background-color: white; transform: rotateY(180deg); }
  </style>
</head>
<body>
  <h1>Memory</h1>
  <div class="stats">
    <p>Mosse: <span id="moves">0</span></p>
    <p>Record: <span id="best-score">-</span></p>
  </div>
  <button id="reset-btn">🔄 Nuova Partita</button>
  
  <div id="game-board" class="grid-4x4"></div>

  <script src="app.js"></script>
  <script>
    if('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
